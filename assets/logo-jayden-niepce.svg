<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }
      @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      .spin { transform-origin: 200px 185px; animation: rotate 18s linear infinite; }
      .glow { animation: pulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="#0d0010"/>
  <rect width="400" height="400" rx="16" fill="none" stroke="#7c5cfc" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner ticks -->
  <line x1="0" y1="22" x2="18" y2="22" stroke="#7c5cfc" stroke-width="1.5"/>
  <line x1="0" y1="22" x2="0" y2="40" stroke="#7c5cfc" stroke-width="1.5"/>
  <line x1="400" y1="22" x2="382" y2="22" stroke="#7c5cfc" stroke-width="1.5"/>
  <line x1="400" y1="22" x2="400" y2="40" stroke="#7c5cfc" stroke-width="1.5"/>
  <line x1="0" y1="378" x2="18" y2="378" stroke="#7c5cfc" stroke-width="1.5"/>
  <line x1="0" y1="378" x2="0" y2="360" stroke="#7c5cfc" stroke-width="1.5"/>
  <line x1="400" y1="378" x2="382" y2="378" stroke="#7c5cfc" stroke-width="1.5"/>
  <line x1="400" y1="378" x2="400" y2="360" stroke="#7c5cfc" stroke-width="1.5"/>

  <!-- Rotating outer ring -->
  <g class="spin">
    <polygon points="200,75 260,109 260,177 200,211 140,177 140,109"
      fill="none" stroke="#7c5cfc" stroke-width="1" stroke-dasharray="6 10" opacity="0.35"/>
  </g>

  <!-- Outer hexagon -->
  <polygon points="200,80 256,112 256,176 200,208 144,176 144,112"
    fill="none" stroke="#7c5cfc" stroke-width="2"/>

  <!-- Middle hexagon -->
  <polygon points="200,95 241,118 241,164 200,187 159,164 159,118"
    fill="none" stroke="#7c5cfc" stroke-width="0.8" opacity="0.4"/>

  <!-- Inner filled hexagon -->
  <polygon points="200,103 236,124 236,166 200,187 164,166 164,124"
    fill="#1a0030" opacity="0.8"/>

  <!-- Glowing dots at hex corners -->
  <circle cx="200" cy="103" r="2.5" fill="#7c5cfc" class="glow"/>
  <circle cx="236" cy="124" r="2.5" fill="#7c5cfc" class="glow"/>
  <circle cx="236" cy="166" r="2.5" fill="#7c5cfc" class="glow"/>
  <circle cx="200" cy="187" r="2.5" fill="#7c5cfc" class="glow"/>
  <circle cx="164" cy="166" r="2.5" fill="#7c5cfc" class="glow"/>
  <circle cx="164" cy="124" r="2.5" fill="#7c5cfc" class="glow"/>

  <!-- JN text -->
  <text x="200" y="158" text-anchor="middle"
    font-family="Arial" font-weight="700" font-size="38"
    fill="#7c5cfc">JN</text>

  <!-- DEV subtext -->
  <text x="200" y="178" text-anchor="middle"
    font-family="Arial" font-size="9"
    fill="#7c5cfc" letter-spacing="5" opacity="0.7">DEV</text>

  <!-- Name -->
  <text x="200" y="238" text-anchor="middle"
    font-family="Arial" font-weight="700" font-size="17"
    fill="#e8e0ff" letter-spacing="2">JAYDEN NIEPCE</text>

  <!-- Line under name -->
  <line x1="90" y1="248" x2="310" y2="248" stroke="#7c5cfc" stroke-width="0.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="200" y="267" text-anchor="middle"
    font-family="Arial" font-size="10"
    fill="#7c5cfc" letter-spacing="3" opacity="0.8">SOFTWARE · GAME DEV</text>

</svg>
